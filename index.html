<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 일정 달력</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .holiday-text { color: #ef4444; }
        .completed-task { text-decoration: line-through; opacity: 0.6; }
        .event-item { font-size: 0.75rem; padding: 2px 4px; border-radius: 4px; margin-bottom: 2px; cursor: pointer; transition: all 0.2s; }
        .event-item:hover { filter: brightness(90%); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8 min-h-screen">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 id="currentDateDisplay" class="text-3xl font-bold text-slate-800">2023년 10월</h1>
                <p class="text-slate-500 mt-1">당신의 소중한 일정을 관리하세요.</p>
            </div>
            
            <div class="flex items-center gap-2">
                <div class="inline-flex rounded-lg border border-slate-200 bg-white p-1 shadow-sm">
                    <button onclick="changeView('month')" id="btn-month" class="view-btn px-4 py-2 text-sm font-medium rounded-md bg-slate-100 text-slate-900">월별</button>
                    <button onclick="changeView('week')" id="btn-week" class="view-btn px-4 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700">주별</button>
                    <button onclick="changeView('day')" id="btn-day" class="view-btn px-4 py-2 text-sm font-medium rounded-md text-slate-500 hover:text-slate-700">일별</button>
                </div>
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-semibold shadow-lg shadow-indigo-200 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    일정 추가
                </button>
            </div>
        </header>

        <!-- Navigation Controls -->
        <div class="flex items-center gap-4 mb-6">
            <button onclick="movePrev()" class="p-2 hover:bg-white rounded-full border border-transparent hover:border-slate-200 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button onclick="goToday()" class="px-4 py-1.5 text-sm font-medium bg-white border border-slate-200 rounded-md hover:bg-slate-50">오늘</button>
            <button onclick="moveNext()" class="p-2 hover:bg-white rounded-full border border-transparent hover:border-slate-200 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>

        <!-- Main Calendar Container -->
        <main id="calendarContainer" class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
            <!-- View content will be injected here -->
        </main>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                <h2 id="modalTitle" class="text-xl font-bold">새 일정 추가</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="eventForm" class="p-6 space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">일정 제목</label>
                    <input type="text" id="eventTitle" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all" placeholder="무엇을 하나요?">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">시작일</label>
                        <input type="date" id="eventStart" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">종료일</label>
                        <input type="date" id="eventEnd" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <div class="flex items-center gap-6 py-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="isHoliday" class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500">
                        <span class="text-sm font-medium text-slate-700 group-hover:text-indigo-600">휴일로 지정</span>
                    </label>
                    <label id="completeToggle" class="hidden flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" id="isCompleted" class="w-4 h-4 text-emerald-600 rounded border-slate-300 focus:ring-emerald-500">
                        <span class="text-sm font-medium text-slate-700 group-hover:text-emerald-600">완료됨</span>
                    </label>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="deleteEvent()" id="deleteBtn" class="hidden px-4 py-2.5 text-sm font-semibold text-red-600 hover:bg-red-50 rounded-lg transition-all">삭제</button>
                    <button type="button" onclick="closeModal()" class="px-4 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-100 rounded-lg transition-all">취소</button>
                    <button type="submit" class="px-6 py-2.5 text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-md shadow-indigo-100 transition-all">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- State Management ---
        let currentDate = new Date();
        let currentView = 'month'; // 'month', 'week', 'day'
        let events = JSON.parse(localStorage.getItem('calendar_events')) || [];

        const calendarContainer = document.getElementById('calendarContainer');
        const currentDateDisplay = document.getElementById('currentDateDisplay');
        const eventForm = document.getElementById('eventForm');
        const eventModal = document.getElementById('eventModal');

        // --- Core Logic ---

        function init() {
            render();
            setupEventListeners();
        }

        function setupEventListeners() {
            eventForm.onsubmit = (e) => {
                e.preventDefault();
                saveEvent();
            };
        }

        function saveEventsToStorage() {
            localStorage.setItem('calendar_events', JSON.stringify(events));
        }

        function render() {
            updateHeader();
            if (currentView === 'month') renderMonth();
            else if (currentView === 'week') renderWeek();
            else if (currentView === 'day') renderDay();
        }

        function updateHeader() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            
            if (currentView === 'month') {
                currentDateDisplay.innerText = `${year}년 ${month}월`;
            } else if (currentView === 'week') {
                const startOfWeek = getStartOfWeek(currentDate);
                const endOfWeek = new Date(startOfWeek);
                endOfWeek.setDate(endOfWeek.getDate() + 6);
                currentDateDisplay.innerText = `${startOfWeek.getMonth() + 1}월 ${startOfWeek.getDate()}일 - ${endOfWeek.getMonth() + 1}월 ${endOfWeek.getDate()}일`;
            } else {
                currentDateDisplay.innerText = `${year}년 ${month}월 ${currentDate.getDate()}일`;
            }

            // UI Button states
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.classList.remove('bg-slate-100', 'text-slate-900');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`btn-${currentView}`);
            activeBtn.classList.remove('text-slate-500');
            activeBtn.classList.add('bg-slate-100', 'text-slate-900');
        }

        // --- Calendar Views ---

        function renderMonth() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevLastDate = new Date(year, month, 0).getDate();

            let html = `
                <div class="grid grid-cols-7 border-b border-slate-100 bg-slate-50/50">
                    ${['일', '월', '화', '수', '목', '금', '토'].map((d, i) => `
                        <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase tracking-wider ${i === 0 ? 'text-red-400' : ''}">${d}</div>
                    `).join('')}
                </div>
                <div class="grid grid-cols-7">
            `;

            // Prev Month Days
            for (let i = firstDay; i > 0; i--) {
                html += `<div class="min-h-[120px] p-2 border-r border-b border-slate-50 opacity-25 bg-slate-50/30">
                    <span class="text-sm font-medium">${prevLastDate - i + 1}</span>
                </div>`;
            }

            // Current Month Days
            for (let i = 1; i <= lastDate; i++) {
                const dateStr = formatDate(new Date(year, month, i));
                const isToday = formatDate(new Date()) === dateStr;
                const dayEvents = getEventsForDate(dateStr);
                const hasHoliday = dayEvents.some(e => e.isHoliday);

                html += `
                    <div class="min-h-[120px] p-2 border-r border-b border-slate-100 group hover:bg-slate-50/50 transition-colors">
                        <div class="flex justify-between items-start mb-2">
                            <span class="inline-flex items-center justify-center w-7 h-7 text-sm font-bold rounded-full 
                                ${isToday ? 'bg-indigo-600 text-white' : (hasHoliday ? 'text-red-500' : 'text-slate-600')}">
                                ${i}
                            </span>
                        </div>
                        <div class="space-y-1">
                            ${dayEvents.map(ev => `
                                <div onclick="openEditModal('${ev.id}')" class="event-item truncate ${ev.isHoliday ? 'bg-red-50 text-red-600 border border-red-100' : (ev.isCompleted ? 'bg-slate-100 text-slate-400 border border-slate-200' : 'bg-indigo-50 text-indigo-700 border border-indigo-100')} ${ev.isCompleted ? 'completed-task' : ''}">
                                    ${ev.title}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Fill empty slots
            const totalSlots = 42;
            const currentSlots = firstDay + lastDate;
            for (let i = 1; i <= totalSlots - currentSlots; i++) {
                html += `<div class="min-h-[120px] p-2 border-r border-b border-slate-50 opacity-25 bg-slate-50/30">
                    <span class="text-sm font-medium">${i}</span>
                </div>`;
            }

            html += `</div>`;
            calendarContainer.innerHTML = html;
        }

        function renderWeek() {
            const startOfWeek = getStartOfWeek(currentDate);
            let html = `
                <div class="grid grid-cols-8 divide-x divide-slate-100 h-[600px] overflow-y-auto custom-scrollbar">
                    <div class="bg-slate-50/50 p-4">
                        <div class="h-10"></div>
                        <div class="text-xs font-bold text-slate-400 mt-4">종일 일정</div>
                    </div>
            `;

            for (let i = 0; i < 7; i++) {
                const day = new Date(startOfWeek);
                day.setDate(day.getDate() + i);
                const dateStr = formatDate(day);
                const isToday = formatDate(new Date()) === dateStr;
                const dayEvents = getEventsForDate(dateStr);
                const hasHoliday = dayEvents.some(e => e.isHoliday);

                html += `
                    <div class="p-4 flex flex-col gap-4">
                        <div class="text-center">
                            <div class="text-xs font-bold text-slate-400 mb-1">
                                ${['일', '월', '화', '수', '목', '금', '토'][day.getDay()]}
                            </div>
                            <div class="inline-flex items-center justify-center w-8 h-8 rounded-full text-lg font-bold 
                                ${isToday ? 'bg-indigo-600 text-white' : (hasHoliday ? 'text-red-500' : 'text-slate-600')}">
                                ${day.getDate()}
                            </div>
                        </div>
                        <div class="flex-1 space-y-2">
                            ${dayEvents.map(ev => `
                                <div onclick="openEditModal('${ev.id}')" class="p-3 rounded-xl border transition-all hover:scale-[1.02] cursor-pointer 
                                    ${ev.isHoliday ? 'bg-red-50 border-red-100' : (ev.isCompleted ? 'bg-slate-50 border-slate-200' : 'bg-white border-slate-100 shadow-sm shadow-slate-100')}">
                                    <div class="text-xs font-bold ${ev.isHoliday ? 'text-red-500' : (ev.isCompleted ? 'text-slate-400' : 'text-indigo-600')} mb-1">
                                        ${ev.isHoliday ? '휴일' : (ev.isCompleted ? '완료' : '일정')}
                                    </div>
                                    <div class="text-sm font-semibold ${ev.isCompleted ? 'completed-task text-slate-400' : 'text-slate-800'}">
                                        ${ev.title}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            html += `</div>`;
            calendarContainer.innerHTML = html;
        }

        function renderDay() {
            const dateStr = formatDate(currentDate);
            const dayEvents = getEventsForDate(dateStr);
            const isToday = formatDate(new Date()) === dateStr;

            let html = `
                <div class="p-8">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="text-6xl font-black text-slate-200">${currentDate.getDate()}</div>
                        <div>
                            <div class="text-xl font-bold text-slate-800">${['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'][currentDate.getDay()]}</div>
                            <div class="text-slate-500">${isToday ? '오늘의 일정입니다.' : '이날의 일정을 확인하세요.'}</div>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        ${dayEvents.length === 0 ? `
                            <div class="py-20 text-center border-2 border-dashed border-slate-100 rounded-3xl">
                                <div class="text-slate-300 mb-2">등록된 일정이 없습니다.</div>
                                <button onclick="openModal()" class="text-indigo-600 font-bold hover:underline">새 일정 추가하기</button>
                            </div>
                        ` : dayEvents.map(ev => `
                            <div onclick="openEditModal('${ev.id}')" class="flex items-center justify-between p-6 rounded-2xl border transition-all hover:border-indigo-200 cursor-pointer 
                                ${ev.isHoliday ? 'bg-red-50/50 border-red-100' : (ev.isCompleted ? 'bg-slate-50 border-slate-100' : 'bg-white border-slate-100 shadow-sm')}">
                                <div class="flex items-center gap-6">
                                    <div class="w-1.5 h-12 rounded-full ${ev.isHoliday ? 'bg-red-400' : (ev.isCompleted ? 'bg-slate-300' : 'bg-indigo-500')}"></div>
                                    <div>
                                        <h4 class="text-lg font-bold ${ev.isCompleted ? 'completed-task text-slate-400' : 'text-slate-800'}">${ev.title}</h4>
                                        <p class="text-sm text-slate-500 mt-1">${ev.start} ~ ${ev.end} ${ev.isHoliday ? '· 휴일' : ''}</p>
                                    </div>
                                </div>
                                <div>
                                    ${ev.isCompleted ? `
                                        <span class="px-3 py-1 bg-emerald-100 text-emerald-700 text-xs font-bold rounded-full uppercase tracking-wider">Completed</span>
                                    ` : `
                                        <span class="px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-full uppercase tracking-wider">On-going</span>
                                    `}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            calendarContainer.innerHTML = html;
        }

        // --- Helpers ---

        function formatDate(date) {
            const d = new Date(date);
            let month = '' + (d.getMonth() + 1);
            let day = '' + d.getDate();
            const year = d.getFullYear();

            if (month.length < 2) month = '0' + month;
            if (day.length < 2) day = '0' + day;

            return [year, month, day].join('-');
        }

        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day;
            return new Date(d.setDate(diff));
        }

        function getEventsForDate(dateStr) {
            return events.filter(ev => {
                return dateStr >= ev.start && dateStr <= ev.end;
            }).sort((a, b) => b.isHoliday - a.isHoliday); // Holidays first
        }

        // --- Event Interaction ---

        function moveNext() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
            else currentDate.setDate(currentDate.getDate() + 1);
            render();
        }

        function movePrev() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
            else currentDate.setDate(currentDate.getDate() - 1);
            render();
        }

        function goToday() {
            currentDate = new Date();
            render();
        }

        function changeView(view) {
            currentView = view;
            render();
        }

        // --- Modal Logic ---

        function openModal() {
            document.getElementById('modalTitle').innerText = "새 일정 추가";
            document.getElementById('eventForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('completeToggle').classList.add('hidden');
            
            // Default date to current
            const today = formatDate(currentDate);
            document.getElementById('eventStart').value = today;
            document.getElementById('eventEnd').value = today;
            
            eventModal.classList.remove('hidden');
        }

        function openEditModal(id) {
            const ev = events.find(e => e.id === id);
            if (!ev) return;

            document.getElementById('modalTitle').innerText = "일정 수정";
            document.getElementById('editId').value = ev.id;
            document.getElementById('eventTitle').value = ev.title;
            document.getElementById('eventStart').value = ev.start;
            document.getElementById('eventEnd').value = ev.end;
            document.getElementById('isHoliday').checked = ev.isHoliday || false;
            document.getElementById('isCompleted').checked = ev.isCompleted || false;
            
            document.getElementById('deleteBtn').classList.remove('hidden');
            document.getElementById('completeToggle').classList.remove('hidden');
            eventModal.classList.remove('hidden');
        }

        function closeModal() {
            eventModal.classList.add('hidden');
        }

        function saveEvent() {
            const id = document.getElementById('editId').value;
            const title = document.getElementById('eventTitle').value;
            const start = document.getElementById('eventStart').value;
            const end = document.getElementById('eventEnd').value;
            const isHoliday = document.getElementById('isHoliday').checked;
            const isCompleted = document.getElementById('isCompleted').checked;

            if (id) {
                // Update
                const index = events.findIndex(e => e.id === id);
                events[index] = { ...events[index], title, start, end, isHoliday, isCompleted };
            } else {
                // Create
                events.push({
                    id: Date.now().toString(),
                    title,
                    start,
                    end,
                    isHoliday,
                    isCompleted: false
                });
            }

            saveEventsToStorage();
            closeModal();
            render();
        }

        function deleteEvent() {
            const id = document.getElementById('editId').value;
            if (!id) return;
            
            if (confirm('정말로 이 일정을 삭제하시겠습니까?')) {
                events = events.filter(e => e.id !== id);
                saveEventsToStorage();
                closeModal();
                render();
            }
        }

        // --- Initialization ---
        window.onload = init;
    </script>
</body>
</html>
